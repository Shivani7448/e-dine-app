<!DOCTYPE html>
<html lang="en">
<head>
  <title>Update Table Form</title>
  <link rel="stylesheet" href="/static/style.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
  <style>
    #form-body{
      width: 340px;
      height: 455px;
      margin-top: 170px;
    }
  </style>
</head>
<body>
  <div id="main">
    <div id="canvas">
      <div id="form-body">
        <h2>Update Table</h2>
        <form action="" method="post">
        <div class="mb-3">
          <label for="Input1" class="form-label">Table Number</label>
          <input type="text" class="form-control" id="Input1" value="{{tbl.table_number}}" name="table_number">
        </div>
        <div class="mb-3">
          <label for="Input3" class="form-label">Capacity</label>
          <input type="number" class="form-control" id="Input3" value="{{tbl.capacity}}" name="capacity">
        </div>
        <div class="mb-3">
          <label for="Input2" class="form-label">Location</label>
          <select id="Input2" class="form-select"  name="location">
            <option value="Indoor">Indoor</option>
            <option value="Outdoor">Outdoor</option>
          </select>
        </div>
        <div class="mb-3">
          <label for="Input4" class="form-label">Status</label>
          <select id="Input4" class="form-select" name="status" aria-label="Default select example">
            <option value="available">available</option>
            <option value="inactive">inactive</option>
          </select>
        </div>
        <div class="text-center">
          <input type="submit" class="btn btn-primary" value="Update">
        </div>
        </form>
      </div>
    </div>
  </div>
</body>
</html>
