<!DOCTYPE html>
<html lang="en">
<head>
  <title>User Dashboard</title>
  <link rel="stylesheet" href="/static/style.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
</head>
<body>
  <div id="main">
    <div id="canvas">
      <nav class="navbar navbar-expand-lg navbar-light bg-light">
      <div class="container-fluid">
      <a class="navbar-brand" href="#">Welcome {{this_user.username}}!</a>
      
      <div class="collapse navbar-collapse" id="navbarSupportedContent">
        <ul class="navbar-nav me-auto mb-2 mb-lg-0">
          <li class="nav-item">
            <a class="nav-link active" aria-current="page" href="/user/requests/{{this_user.id}}">Requests</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="/login">Log Out</a>
          </li>
        </ul>
        <form class="d-flex">
          <input class="form-control me-2" type="search" placeholder="Search" aria-label="Search">
          <button class="btn btn-outline-success" type="submit">Search</button>
        </form>
       </div>
      </div>
      </nav>
      <div id="content">
        <h3 class="headings">Available Tables</h3>
        <table class="table text-center border">
          <thead>
            <tr>
              <th>ID</th>
              <th>Table No.</th>
              <th>Capacity</th>
              <th>Location</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody>
            {% for tbl in all_tables %}
            <tr>
              <th>{{tbl.id}}</th>
              <td>{{tbl.table_number}}</td>
              <td>{{tbl.capacity}}</td>
              <td>{{tbl.location}}</td>
              <!-- <td>
                <a href="/reserve/{{tbl.id}}/{{this_user.id}}" class="btn btn-primary mx-2">Reserve</a>
              </td> -->
              <td>
                {% if tbl.status == 'available' %}
                <a href="/reserve/{{tbl.id}}/{{this_user.id}}" class="btn btn-primary">Reserve</a>
                {% else %}
                Unavailable
                {% endif %}
              </td>
            </tr>
            {% endfor %}
          </tbody>
        </table>
      </div> 
    </div>
  </div>
</body>
</html>
