<!DOCTYPE html>
<html lang="en">
<head>
  <title>Reserve Table Form</title>
  <link rel="stylesheet" href="/static/style.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
  <style>
    #form-body{
      width: 340px;
      height: 380px;
    }
  </style>
</head>
<body>
  <div id="main">
    <div id="canvas">
      <div id="form-body">
        <h2>Reservation Request</h2>
        <form action="/reserve/{{tbl.id}}/{{user.id}}" method="post">
        <div class="mb-3">
          <label for="Input1" class="form-label">Table Number</label>
          <input class="form-control" type="text" value="{{tbl.table_number}}" aria-label="Disabled input example" disabled readonly>
        </div>
        <div class="mb-3">
          <label for="Input3" class="form-label">Date</label>
          <input type="date" class="form-control" id="Input3" name="date" required>
        </div>
        <div class="mb-3">
          <label for="Input4" class="form-label">Time Slot</label>
          <input type="text" class="form-control" id="Input4" name="time_slot" placeholder="e.g. 7PM-9PM" required>
        </div>
        
        <div class="text-center">
          <input type="submit" class="btn btn-primary" value="Reserve">
        </div>
        </form>
      </div>
    </div>
  </div>
</body>
</html>
