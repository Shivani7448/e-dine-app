<!DOCTYPE html>
<html lang="en">
<head>
  <title>Register Form</title>
  <link rel="stylesheet" href="/static/style.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
</head>
<body>
  <div id="main">
    <div id="canvas">
      <div id="form-body">
        <h2>Register Form</h2>
        <div class="mb-3">
          <label for="Input1" class="form-label">Username</label>
          <input type="text" class="form-control" id="Input1" >
        </div>
        <div class="mb-3">
          <label for="Input3" class="form-label">Email</label>
          <input type="email" class="form-control" id="Input3" >
        </div>
        <div class="mb-3">
          <label for="Input2" class="form-label">Password</label>
          <input type="password" class="form-control" id="Input2" >
        </div>
        <div class="text-center">
          <input type="submit" class="btn btn-primary" value="Register"><br>
          Already registered? <a href="login.html">Login</a>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
