<!DOCTYPE html>
<html lang="en">
<head>
  <title>Manager Dashboard</title>
  <link rel="stylesheet" href="/static/style.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
</head>
<body>
  <div id="main">
    <div id="canvas">
      <nav class="navbar navbar-expand-lg navbar-light bg-light">
      <div class="container-fluid">
      <a class="navbar-brand" href="#">Welcome Manager!</a>
      
      <div class="collapse navbar-collapse" id="navbarSupportedContent">
        <ul class="navbar-nav me-auto mb-2 mb-lg-0">
          <li class="nav-item">
            <a class="nav-link active" aria-current="page" href="#">Requests</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#">Summary</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#">Log Out</a>
          </li>
        </ul>
        <form class="d-flex">
          <input class="form-control me-2" type="search" placeholder="Search" aria-label="Search">
          <button class="btn btn-outline-success" type="submit">Search</button>
        </form>
       </div>
      </div>
      </nav>
      <div id="content">
        <h3 class="headings">Manage Tables</h3>
        <table class="table text-center border">
          <thead>
            <tr>
              <th>ID</th>
              <th>Table No.</th>
              <th>Capacity</th>
              <th>Location</th>
              <th>Status</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <th>1</th>
              <td>T1</td>
              <td>10</td>
              <td>Indoor</td>
              <td>available</td>
              <td>
                <a href="" class="btn btn-warning mx-2">Update</a>
                <a href="" class="btn btn-danger">Delete</a>
              </td>
            </tr>
            
          </tbody>
        </table>
        <div class="text-end">
          <a href="" class="btn btn-primary mx-3 my-5">Create Table</a>
        </div>
      </div> 
    </div>
  </div>
</body>
</html>
